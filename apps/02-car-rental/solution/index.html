<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiro Car Rental</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="brand">🚗 Kiro Car Rental</div>
      <nav class="tabs">
        <button class="tab active" data-view="browse">Browse Cars</button>
        <button class="tab" data-view="bookings">My Bookings</button>
      </nav>
    </div>
  </header>

  <div class="view" id="browseView">
    <div class="filter-bar">
      <button class="filter-btn active" data-type="All">All</button>
      <button class="filter-btn" data-type="Sedan">Sedan</button>
      <button class="filter-btn" data-type="SUV">SUV</button>
      <button class="filter-btn" data-type="Luxury">Luxury</button>
      <button class="filter-btn" data-type="Electric">Electric</button>
    </div>
    <div class="car-grid" id="carGrid"></div>
  </div>

  <div class="view" id="bookingsView" style="display:none">
    <div class="bookings-list" id="bookingsList"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Book Car</div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="bookingName" placeholder="Full name">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Pickup Date</label>
            <input type="date" id="pickupDate">
          </div>
          <div class="form-group">
            <label>Return Date</label>
            <input type="date" id="returnDate">
          </div>
        </div>
        <div class="form-group">
          <label>Pickup Location</label>
          <select id="pickupLocation">
            <option value="">Select location</option>
            <option value="Airport">Airport</option>
            <option value="Downtown">Downtown</option>
            <option value="Hotel">Hotel</option>
          </select>
        </div>
        <div class="cost-preview" id="costPreview" style="display:none">
          <div class="cost-label">Estimated Total</div>
          <div class="cost-amount" id="costAmount"></div>
        </div>
        <div class="form-error" id="formError" style="display:none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="modalCancel">Cancel</button>
        <button class="btn-primary" id="confirmBook">Confirm Booking</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
