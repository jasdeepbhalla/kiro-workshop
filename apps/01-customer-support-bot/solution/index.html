<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiro Support</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">Kiro Support</span>
      </div>
      <nav class="nav">
        <button class="nav-item active">💬 Chat</button>
        <button class="nav-item" id="faqNavBtn">📖 FAQ</button>
        <button class="nav-item" id="logsNavBtn">📊 Logs</button>
      </nav>
      <div class="sidebar-footer">
        <div class="status-dot"></div>
        <span>Bot is online</span>
      </div>
    </aside>

    <main class="chat-main" id="chatView">
      <header class="chat-header">
        <div class="agent-info">
          <div class="agent-avatar">🤖</div>
          <div>
            <div class="agent-name">Kiro Assistant</div>
            <div class="agent-status">Typically replies instantly</div>
          </div>
        </div>
        <button class="escalate-btn" id="escalateBtn">👤 Talk to a human</button>
      </header>

      <div class="messages" id="messages"></div>

      <div class="typing-indicator" id="typing">
        <div class="typing-bubble">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="userInput"
          placeholder="Ask me anything about Kiro..."
          autocomplete="off"
        />
        <button id="sendBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </main>

    <main class="panel-main" id="faqView" style="display:none">
      <header class="panel-header">
        <span>📖 Knowledge Base</span>
        <span class="faq-count" id="faqCount"></span>
      </header>
      <div class="faq-list" id="faqList"></div>
    </main>

    <main class="panel-main" id="logsView" style="display:none">
      <header class="panel-header">
        <span>📊 Conversation Logs</span>
        <button class="clear-btn" id="clearLogsBtn">Clear</button>
      </header>
      <div class="logs-list" id="logsList"></div>
    </main>
  </div>

  <script src="bot.js"></script>
  <script src="app.js"></script>
</body>
</html>
